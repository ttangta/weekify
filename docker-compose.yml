version: '3.8'

services:
  weekify-db:
    image: mysql:8.0
    container_name: weekify-db
    env_file:
      - .env
    ports:
      - "${MYSQL_PORT}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7
    container_name: weekify-redis
    env_file:
      - .env
    ports:
      - "${REDIS_PORT}:6379"
    restart: unless-stopped

volumes:
  mysql_data: